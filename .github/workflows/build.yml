name: Build Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
            ext: so
          - os: ubuntu-24.04
            goos: linux
            goarch: arm64
            ext: so
          - os: macos-14
            goos: darwin
            goarch: arm64
            ext: dylib
          - os: windows-2022
            goos: windows
            goarch: amd64
            ext: dll

    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out plugin source
        uses: actions/checkout@v4

      - name: Check out CLIProxyAPI SDK
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          ref: main
          path: CLIProxyAPI

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CLIProxyAPI/go.mod
          cache: false

      - name: Adjust replace directive
        shell: bash
        run: |
          # Point the replace directive to the checked-out CLIProxyAPI.
          sed -i 's|=> ../CLIProxyAPI|=> ${{ github.workspace }}/CLIProxyAPI|' go.mod
          cat go.mod

      - name: Download deps
        run: go mod download

      - name: Build shared library
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          mkdir -p output
          go build -buildmode=c-shared -o output/model-fallback-chain-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.ext }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/model-fallback-chain-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
